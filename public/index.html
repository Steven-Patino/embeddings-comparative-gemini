<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Comparador de Embeddings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=DM+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <p class="eyebrow">Gemini Embeddings Lab</p>
        <h1>Compara una frase con dos modelos de embeddings</h1>
        <p class="subtitle">
          Escribe una palabra o una frase, enviala al backend y visualiza abajo el
          identificador del registro y la similitud coseno calculada.
        </p>
      </section>

      <section class="panel">
        <form id="embedding-form" class="form">
          <label class="label" for="text-input">Texto a comparar</label>
          <textarea
            id="text-input"
            name="text"
            class="input"
            rows="4"
            placeholder="Ejemplo: busqueda semantica con inteligencia artificial"
            required
          ></textarea>

          <button id="submit-button" class="button" type="submit">
            Obtener resultado
          </button>
        </form>

        <section id="result-card" class="result-card hidden" aria-live="polite">
          <p class="result-tag">Resultado</p>
          <div class="result-grid">
            <article class="result-item">
              <span class="result-label">Request ID</span>
              <strong id="request-id" class="result-value"></strong>
            </article>
            <article class="result-item">
              <span class="result-label">Similitud coseno</span>
              <strong id="similarity" class="result-value"></strong>
            </article>
          </div>
        </section>

        <p id="status-message" class="status-message"></p>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
  </html>
